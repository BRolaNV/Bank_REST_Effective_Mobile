openapi: 3.0.1
info:
  title: Bank Card API
  description: API for managing bank cards
  version: "1.0"
servers:
  - url: http://localhost:8080
    description: Generated server url
security:
  - Bearer Auth: []
tags:
  - name: Admin Card Controller
    description: Controller for managing cards by admin
  - name: User Card Controller
    description: Controller for managing cards by user
  - name: Transfer Controller
    description: Controller for managing transfers
  - name: Auth Controller
    description: Controller for managing authentication
paths:
  /api/user/cards/{id}/request-block:
    put:
      tags:
        - User Card Controller
      summary: Block a card by ID
      description: Request to block a card by ID
      operationId: blockCard
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "404":
          description: Card not found
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/CardResponse'
        "200":
          description: Card blocked successfully
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/CardResponse'
  /api/admin/cards/{id}/block:
    put:
      tags:
        - Admin Card Controller
      summary: Block a card
      description: Blocks a card by ID
      operationId: blockCard_1
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "403":
          description: Access denied
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/CardResponse'
        "404":
          description: Card not found
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/CardResponse'
        "200":
          description: Card blocked successfully
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/CardResponse'
  /api/admin/cards/{id}/activate:
    put:
      tags:
        - Admin Card Controller
      summary: Activate a card
      description: Activates a card by ID
      operationId: activateCard
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "403":
          description: Access denied
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/CardResponse'
        "200":
          description: Card activated successfully
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/CardResponse'
        "404":
          description: Card not found
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/CardResponse'
  /api/user/transfers:
    post:
      tags:
        - Transfer Controller
      summary: Transfer money between cards
      operationId: transfer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferRequest'
        required: true
      responses:
        "400":
          description: Invalid transfer request
        "403":
          description: Access denied
        "204":
          description: Transfer successful
  /api/auth/register:
    post:
      tags:
        - Auth Controller
      summary: Register a new user
      operationId: register
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
        required: true
      responses:
        "409":
          description: User already exists
        "201":
          description: User registered successfully
        "400":
          description: Invalid request
  /api/auth/login:
    post:
      tags:
        - Auth Controller
      summary: Login a user
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
        required: true
      responses:
        "200":
          description: Login successful
          content:
            '*/*':
              schema:
                type: string
        "400":
          description: Invalid credentials
          content:
            '*/*':
              schema:
                type: string
  /api/admin/cards:
    get:
      tags:
        - Admin Card Controller
      summary: Get all cards
      description: Returns a list of all cards
      operationId: getAllCards
      responses:
        "200":
          description: List of cards retrieved successfully
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CardResponse'
        "403":
          description: Access denied
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CardResponse'
    post:
      tags:
        - Admin Card Controller
      summary: Create a new card
      description: Creates a new card with the provided details
      operationId: createCard
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CardRequest'
        required: true
      responses:
        "403":
          description: Access denied
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/CardResponse'
        "200":
          description: Card created successfully
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/CardResponse'
        "400":
          description: Invalid card number
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/CardResponse'
        "404":
          description: User not found
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/CardResponse'
  /api/user/cards:
    get:
      tags:
        - User Card Controller
      summary: Get user cards
      description: Returns a list of user cards
      operationId: getUserCards
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - ACTIVE
              - BLOCKED
              - EXPIRED
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 10
      responses:
        "200":
          description: List of cards retrieved successfully
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/PageCardResponse'
        "403":
          description: Access denied
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/PageCardResponse'
  /api/user/cards/{id}/balance:
    get:
      tags:
        - User Card Controller
      summary: Get card balance
      description: Returns the balance of a card by ID
      operationId: getBalance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Balance retrieved successfully
          content:
            '*/*':
              schema:
                type: number
        "404":
          description: Card not found
          content:
            '*/*':
              schema:
                type: number
  /api/admin/cards/{id}:
    delete:
      tags:
        - Admin Card Controller
      summary: Delete a card
      description: Deletes a card by ID
      operationId: deleteCard
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "403":
          description: Access denied
        "204":
          description: Card deleted successfully
        "404":
          description: Card not found
components:
  schemas:
    CardResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        maskedCardNumber:
          type: string
        ownerName:
          type: string
        expireDate:
          type: string
        status:
          type: string
          enum:
            - ACTIVE
            - BLOCKED
            - EXPIRED
        balance:
          type: number
    TransferRequest:
      required:
        - amount
        - fromCardId
        - toCardId
      type: object
      properties:
        fromCardId:
          type: integer
          format: int64
        toCardId:
          type: integer
          format: int64
        amount:
          minimum: 0.01
          exclusiveMinimum: false
          type: number
    AuthRequest:
      required:
        - password
        - username
      type: object
      properties:
        username:
          type: string
        password:
          type: string
    CardRequest:
      required:
        - cardNumber
        - expireDate
        - ownerName
        - userId
      type: object
      properties:
        cardNumber:
          pattern: "\\d{16}|\\d{4}-\\d{4}-\\d{4}-\\d{4}|\\d{4} \\d{4} \\d{4} \\d{4}"
          type: string
        userId:
          type: integer
          format: int64
        ownerName:
          type: string
        expireDate:
          type: string
    PageCardResponse:
      type: object
      properties:
        totalPages:
          type: integer
          format: int32
        totalElements:
          type: integer
          format: int64
        size:
          type: integer
          format: int32
        content:
          type: array
          items:
            $ref: '#/components/schemas/CardResponse'
        number:
          type: integer
          format: int32
        sort:
          $ref: '#/components/schemas/SortObject'
        first:
          type: boolean
        last:
          type: boolean
        numberOfElements:
          type: integer
          format: int32
        pageable:
          $ref: '#/components/schemas/PageableObject'
        empty:
          type: boolean
    PageableObject:
      type: object
      properties:
        offset:
          type: integer
          format: int64
        sort:
          $ref: '#/components/schemas/SortObject'
        pageNumber:
          type: integer
          format: int32
        pageSize:
          type: integer
          format: int32
        paged:
          type: boolean
        unpaged:
          type: boolean
    SortObject:
      type: object
      properties:
        empty:
          type: boolean
        sorted:
          type: boolean
        unsorted:
          type: boolean
  securitySchemes:
    Bearer Auth:
      type: http
      scheme: bearer
      bearerFormat: JWT

